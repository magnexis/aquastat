<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AquaStat Desktop is a local-first facility intelligence workspace for water-aware infrastructure analysis."
    />
    <title>AquaStat Desktop</title>
    <link rel="icon" type="image/png" href="../docs/assets/aquastat-brand.png" />
    <style>
      :root {
        color-scheme: light;
        background: #eaf5f5;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(13, 139, 143, 0.12), transparent 28%),
          linear-gradient(180deg, #f5fbfb 0%, #e8f2f1 100%);
      }
    </style>
  </head>
  <body>
    <label for="region-select" style="display:block;margin:12px;">Region:</label>
    <select id="region-select" style="margin:0 12px 12px;">
      <option value="us-east">US East</option>
      <option value="us-west">US West</option>
      <option value="eu-west">EU West</option>
      <option value="ap-south">AP South</option>
    </select>
    <script type="module" src="./dist/main.js"></script>
  </body>
  </html>
