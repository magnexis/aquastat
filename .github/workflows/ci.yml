name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Install JavaScript SDK dependencies
        working-directory: js-sdk
        run: npm install

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Lint
        run: flake8 app tests scripts --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Billing security regression tests
        run: pytest tests/test_billing_foundation.py -k "quota_summary_for_managed_key or billing_projects_usage_and_csv_export or square_webhook_completes_checkout"

      - name: Run tests
        run: pytest

      - name: Bytecode validation
        run: python -m compileall app tests scripts

      - name: Generate OpenAPI
        run: python scripts/generate_openapi.py

      - name: Validate OpenAPI JSON
        run: |
          python -m json.tool openapi.json > /dev/null
          python -m json.tool openapi/openapi.json > /dev/null
          test -f openapi/openapi.yaml

      - name: Build docs site
        run: python scripts/build_docs_site.py

      - name: Validate docs artifact
        run: |
          test -f site/index.html
          test -f site/openapi.json
          test -f site/openapi.yaml

      - name: Build JavaScript SDK
        working-directory: js-sdk
        run: npm run build

      - name: Type-check desktop app
        working-directory: desktop
        run: npm run typecheck

      - name: Build desktop app
        working-directory: desktop
        run: npm run build

      - name: Build Docker image
        run: docker build -t aquastat-api:test .

      - name: Smoke test Docker image
        run: |
          docker run -d --name aquastat-smoke -p 18080:8080 aquastat-api:test
          sleep 8
          curl --fail http://127.0.0.1:18080/health
          curl --fail http://127.0.0.1:18080/openapi.json > /dev/null
          docker rm -f aquastat-smoke
