name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-release-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            desktop/package-lock.json
            js-sdk/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install build

      - name: Build Python SDK
        working-directory: sdk
        run: |
          rm -rf dist
          python -m build

      - name: Build JavaScript SDK
        working-directory: js-sdk
        run: npm ci && npm run build

      - name: Build desktop bundle
        working-directory: desktop
        run: npm ci && npm run build

      - name: Generate OpenAPI artifacts
        run: python scripts/generate_openapi.py

      - name: Build docs artifact
        run: python scripts/build_docs_site.py

      - name: Archive release payload
        run: |
          mkdir -p release-assets
          cp -r openapi release-assets/openapi
          cp -r site release-assets/site
          cp -r sdk/dist release-assets/python-sdk
          cp -r js-sdk/dist release-assets/js-sdk
          cp -r desktop/dist release-assets/desktop

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aquastat-release-assets
          path: release-assets

      - name: Attach artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            openapi/openapi.json
            openapi/openapi.yaml

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v') && secrets.PYPI_API_TOKEN != ''
    needs: build-release-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Python SDK
        working-directory: sdk
        run: |
          rm -rf dist
          python -m build

      - name: Check Python distribution
        run: python -m twine check sdk/dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload sdk/dist/*

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v') && secrets.NPM_TOKEN != ''
    needs: build-release-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: js-sdk/package-lock.json

      - name: Install dependencies
        working-directory: js-sdk
        run: npm ci

      - name: Build package
        working-directory: js-sdk
        run: npm run build

      - name: Publish to npm
        working-directory: js-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
